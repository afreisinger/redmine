name: Build and Test Docker Images

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'redmine-plugins/**'
      - 'redmine-themes/**'
      - '.github/workflows/build-docker.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'redmine-plugins/**'
      - 'redmine-themes/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-plugins:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (plugins)
        id: meta-plugins
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/redmine-plugins
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push plugins image
        uses: docker/build-push-action@v5
        with:
          context: ./redmine-plugins
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-plugins.outputs.tags }}
          labels: ${{ steps.meta-plugins.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            PLUGINS_VERSION=${{ github.ref_name }}

  build-themes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (themes)
        id: meta-themes
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/redmine-themes
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push themes image
        uses: docker/build-push-action@v5
        with:
          context: ./redmine-themes
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-themes.outputs.tags }}
          labels: ${{ steps.meta-themes.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            THEMES_VERSION=${{ github.ref_name }}

  scan-vulnerabilities:
    runs-on: ubuntu-latest
    needs: [build-plugins, build-themes]
    if: github.event_name != 'pull_request'
    
    steps:
      - name: Run Trivy vulnerability scanner (plugins)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/redmine-plugins:latest
          format: 'sarif'
          output: 'trivy-plugins.sarif'

      - name: Run Trivy vulnerability scanner (themes)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/redmine-themes:latest
          format: 'sarif'
          output: 'trivy-themes.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-*.sarif'

  test-compose:
    runs-on: ubuntu-latest
    needs: [build-plugins, build-themes]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create test .env file
        run: |
          cp env\ copy.example .env
          echo "DB_PASSWORD=testpassword123" >> .env
          echo "REDMINE_SECRET_KEY_BASE=$(openssl rand -hex 64)" >> .env

      - name: Start services with docker compose
        run: |
          docker compose -f docker-compose.yml up -d
          # Wait for services to be healthy
          timeout 180 bash -c 'until docker compose exec -T db pg_isready -U redmine; do sleep 10; done'
          sleep 30

      - name: Check service health
        run: |
          docker compose ps
          docker compose logs redmine | tail -30

      - name: Test Redmine endpoint
        run: |
          timeout 30 bash -c 'until curl -f http://localhost:3000/; do sleep 5; done'
          curl -v http://localhost:3000/ | grep -q "Redmine" && echo "✓ Redmine is responding"

      - name: Cleanup
        if: always()
        run: |
          docker compose down -v

  notify-success:
    runs-on: ubuntu-latest
    needs: [build-plugins, build-themes, scan-vulnerabilities, test-compose]
    if: success()
    
    steps:
      - name: Send success notification
        run: |
          echo "✓ All checks passed!"
          echo "Docker images built and tested successfully"

  notify-failure:
    runs-on: ubuntu-latest
    needs: [build-plugins, build-themes, scan-vulnerabilities, test-compose]
    if: failure()
    
    steps:
      - name: Send failure notification
        run: |
          echo "✗ Build failed!"
          echo "Check logs above for details"
          exit 1
